<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>EXIFフレーム生成ツール</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.js"></script>

<style>
body {
  font-family: "Noto Sans JP", sans-serif;
  padding: 20px;
}
canvas {
  max-width: 100%;
  border: 1px solid #ccc;
  margin-top: 10px;
}
.section {
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h2>EXIFフレーム生成ツール</h2>

<input type="file" id="file"><br><br>

<div class="section">
<b>EXIF表示</b><br>
<label><input type="checkbox" id="allExif" checked onchange="toggleAllExif()"> すべてON/OFF</label><br>

<label><input type="checkbox" class="exifItem" id="maker" checked> メーカー</label>
<label><input type="checkbox" class="exifItem" id="camera" checked> カメラ</label>
<label><input type="checkbox" class="exifItem" id="lens" checked> レンズ</label>
<label><input type="checkbox" class="exifItem" id="fl" checked> 焦点距離</label>
<label><input type="checkbox" class="exifItem" id="iso" checked> ISO</label>
<label><input type="checkbox" class="exifItem" id="f" checked> f値</label>
<label><input type="checkbox" class="exifItem" id="ss" checked> シャッタースピード</label>
</div>

タイトル：<input type="text" id="title"><br>
撮影者：<input type="text" id="author"><br><br>

サイズ：
<select id="ratio">
  <option value="a4">A4</option>
  <option value="2l">2L</option>
</select><br><br>

向き：
<select id="orientation">
  <option value="vertical">縦</option>
  <option value="horizontal">横</option>
</select><br><br>

解像度：
<select id="dpi">
  <option value="600" selected>600dpi（印刷・保存用）</option>
  <option value="300">300dpi（SNS・軽量）</option>
</select><br><br>

ファイル形式：
<select id="format">
  <option value="png">PNG</option>
  <option value="jpeg">JPG</option>
</select><br><br>

<button onclick="generate()">生成</button>
<button onclick="download()">保存</button>

<br><br>
<canvas id="canvas"></canvas>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let img = new Image();

function toggleAllExif() {
  const checked = document.getElementById("allExif").checked;
  document.querySelectorAll(".exifItem").forEach(el => el.checked = checked);
}

function toFraction(decimal) {
  decimal = Number(decimal);
  if (!decimal || decimal === 0) return "";
  return "1/" + Math.round(1 / decimal);
}

function formatFocalLength(fl) {
  if (!fl) return "";
  if (typeof fl === "object" && fl.numerator) {
    return Math.round(fl.numerator / fl.denominator) + "mm";
  }
  return fl + "mm";
}

document.getElementById("file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    img.onload = function() {
      document.getElementById("orientation").value =
        img.width > img.height ? "horizontal" : "vertical";
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

function generate() {
  const file = document.getElementById("file").files[0];
  if (!file) return alert("画像を選択してください");

  const reader = new FileReader();
  reader.onload = function(e) {
    img.onload = function() {

      EXIF.getData(img, function() {

        const maker = EXIF.getTag(this, "Make") || "";
        const camera = EXIF.getTag(this, "Model") || "";
        const lens =
          EXIF.getTag(this, "LensModel") ||
          EXIF.getTag(this, "Lens") ||
          EXIF.getTag(this, "LensSpecification") ||
          "";

        const fl = EXIF.getTag(this, "FocalLength") || "";
        const iso = EXIF.getTag(this, "ISOSpeedRatings") || "";
        const f = EXIF.getTag(this, "FNumber") || "";
        let ss = EXIF.getTag(this, "ExposureTime") || "";

        if (ss) ss = toFraction(ss);

        const ratio = document.getElementById("ratio").value;
        const orientation = document.getElementById("orientation").value;
        const dpi = document.getElementById("dpi").value;
        const scale = dpi == 600 ? 2 : 1;

        let width, height;

        if (ratio === "a4") {
          width = 2480 * scale;
          height = 3508 * scale;
          if (orientation === "horizontal") [width, height] = [height, width];
        } else {
          width = 3543 * scale;
          height = 2362 * scale;
          if (orientation === "vertical") [width, height] = [height, width];
        }

        canvas.width = width;
        canvas.height = height;

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, width, height);

        const frameHeight = 260 * scale;

        const imgRatio = img.width / img.height;
        const canvasRatio = width / (height - frameHeight);

        let drawW, drawH;

        if (imgRatio > canvasRatio) {
          drawW = width * 0.9;
          drawH = drawW / imgRatio;
        } else {
          drawH = (height - frameHeight) * 0.9;
          drawW = drawH * imgRatio;
        }

        const x = (width - drawW) / 2;
        const y = ((height - frameHeight) - drawH) / 2;

        ctx.drawImage(img, x, y, drawW, drawH);

        const centerX = width / 2;
        const baseY = height - frameHeight + (60 * scale);

        const title = document.getElementById("title").value.trim();
        const author = document.getElementById("author").value.trim();

        const titleSize = 72 * scale;
        const infoSize = 36 * scale;

        ctx.font = `700 ${titleSize}px 'Noto Sans JP'`;
        ctx.fillStyle = "#111";

        // ★ここ修正：タイトル空欄なら「」も出さない
        const hasTitle = title !== "";
        const titleText = hasTitle ? "「" + title + "」" : "";

        const titleWidth = ctx.measureText(titleText).width;
        const authorWidth = ctx.measureText(author).width;

        const gap = hasTitle && author ? (40 * scale) : 0;
        const totalWidth = titleWidth + gap + authorWidth;
        let startX = centerX - totalWidth / 2;

        if (hasTitle) {
          ctx.fillText(titleText, startX, baseY);
        }

        if (author) {
          ctx.fillText(author, startX + titleWidth + gap, baseY);
        }

        let infoParts = [];

        if (maker && document.getElementById("maker").checked) infoParts.push(maker);
        if (camera && document.getElementById("camera").checked) infoParts.push(camera);

        if (lens && document.getElementById("lens").checked) {
          if (fl && document.getElementById("fl").checked) {
            infoParts.push(`${lens} (${formatFocalLength(fl)})`);
          } else {
            infoParts.push(lens);
          }
        } else if (fl && document.getElementById("fl").checked) {
          infoParts.push(formatFocalLength(fl));
        }

        if (iso && document.getElementById("iso").checked) infoParts.push("ISO " + iso);
        if (f && document.getElementById("f").checked) infoParts.push("f/" + f);
        if (ss && document.getElementById("ss").checked) infoParts.push(ss);

        ctx.font = `300 ${infoSize}px 'Noto Sans JP'`;
        ctx.fillStyle = "#777";

        const exifY = baseY + (70 * scale);

        let totalExifWidth = infoParts.reduce((sum, item, i) => {
          let w = ctx.measureText(item).width;
          if (i < infoParts.length - 1) w += (40 * scale);
          return sum + w;
        }, 0);

        let xPos = centerX - totalExifWidth / 2;

        infoParts.forEach((item, i) => {
          ctx.fillText(item, xPos, exifY);
          xPos += ctx.measureText(item).width;
          if (i < infoParts.length - 1) xPos += (40 * scale);
        });

      });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function download() {
  const title = document.getElementById("title").value || "untitled";
  const author = document.getElementById("author").value || "unknown";
  const format = document.getElementById("format").value;

  const filename = `「${title}」${author}`;

  const dataUrl = format === "jpeg"
    ? canvas.toDataURL("image/jpeg", 0.95)
    : canvas.toDataURL("image/png");

  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());

  if (isIOS) {
    const w = window.open();
    w.document.write(`
      <title>${filename}</title>
      <img src="${dataUrl}" style="width:100%;">
      <p style="text-align:center;">長押しして保存してください</p>
    `);
  } else {
    const link = document.createElement("a");
    link.download = filename + (format === "jpeg" ? ".jpg" : ".png");
    link.href = dataUrl;
    link.click();
  }
}
</script>

</body>
</html>
